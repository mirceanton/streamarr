{{define "base"}}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamArr</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        :root {
            --sa-bg-primary: #1a1d23;
            --sa-bg-secondary: #22262e;
            --sa-bg-tertiary: #2a2f38;
            --sa-accent: #5d9cec;
            --sa-accent-hover: #4a89dc;
            --sa-text-primary: #e1e4e8;
            --sa-text-muted: #8b949e;
            --sa-border: #333842;
            --sa-success: #3fb950;
            --sa-warning: #d29922;
            --sa-danger: #f85149;
        }
        body {
            background-color: var(--sa-bg-primary);
            color: var(--sa-text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }
        .sidebar {
            width: 220px;
            background-color: var(--sa-bg-secondary);
            min-height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            border-right: 1px solid var(--sa-border);
            z-index: 100;
        }
        .sidebar-brand {
            padding: 1.25rem 1rem;
            border-bottom: 1px solid var(--sa-border);
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--sa-accent);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .sidebar-nav {
            padding: 0.5rem 0;
        }
        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.625rem 1rem;
            color: var(--sa-text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.15s;
            border-left: 3px solid transparent;
        }
        .sidebar-nav a:hover {
            color: var(--sa-text-primary);
            background-color: var(--sa-bg-tertiary);
        }
        .sidebar-nav a.active {
            color: var(--sa-accent);
            border-left-color: var(--sa-accent);
            background-color: rgba(93, 156, 236, 0.08);
        }
        .main-content {
            margin-left: 220px;
            padding: 1.5rem 2rem;
            min-height: 100vh;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--sa-border);
        }
        .page-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0;
        }
        .card {
            background-color: var(--sa-bg-secondary);
            border: 1px solid var(--sa-border);
            border-radius: 6px;
        }
        .card-header {
            background-color: var(--sa-bg-tertiary);
            border-bottom: 1px solid var(--sa-border);
            font-weight: 600;
            padding: 0.75rem 1rem;
        }
        .table {
            color: var(--sa-text-primary);
            margin-bottom: 0;
        }
        .table thead th {
            border-bottom: 2px solid var(--sa-border);
            color: var(--sa-text-muted);
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.625rem 0.75rem;
        }
        .table td {
            border-bottom: 1px solid var(--sa-border);
            padding: 0.625rem 0.75rem;
            vertical-align: middle;
        }
        .table tbody tr:hover {
            background-color: rgba(93, 156, 236, 0.08);
        }
        .table tbody tr.clickable-row {
            cursor: pointer;
        }
        .table tbody tr.track-queued {
            opacity: 0.45;
            background-color: rgba(248, 81, 73, 0.06) !important;
        }
        .table tbody tr.track-queued:hover {
            background-color: rgba(248, 81, 73, 0.06) !important;
        }
        .badge-attention {
            background-color: var(--sa-warning);
            color: #000;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.25em 0.5em;
        }
        .badge-status-pending {
            background-color: var(--sa-warning);
            color: #000;
        }
        .badge-status-running {
            background-color: var(--sa-accent);
        }
        .badge-status-done {
            background-color: var(--sa-success);
        }
        .badge-status-failed {
            background-color: var(--sa-danger);
        }
        .btn-sa {
            background-color: var(--sa-accent);
            border-color: var(--sa-accent);
            color: #fff;
            font-size: 0.85rem;
        }
        .btn-sa:hover {
            background-color: var(--sa-accent-hover);
            border-color: var(--sa-accent-hover);
            color: #fff;
        }
        .btn-outline-sa {
            border-color: var(--sa-accent);
            color: var(--sa-accent);
            font-size: 0.85rem;
        }
        .btn-outline-sa:hover {
            background-color: var(--sa-accent);
            color: #fff;
        }
        .btn-sm {
            font-size: 0.78rem;
            padding: 0.2rem 0.5rem;
        }
        .stream-count {
            color: var(--sa-text-muted);
            font-size: 0.85rem;
        }
        .filter-bar {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
            padding: 0.75rem 1rem;
            background-color: var(--sa-bg-secondary);
            border: 1px solid var(--sa-border);
            border-radius: 6px;
        }
        .text-muted-sa {
            color: var(--sa-text-muted) !important;
        }
        .form-control, .form-select {
            background-color: var(--sa-bg-tertiary);
            border-color: var(--sa-border);
            color: var(--sa-text-primary);
        }
        .form-control:focus, .form-select:focus {
            background-color: var(--sa-bg-tertiary);
            border-color: var(--sa-accent);
            color: var(--sa-text-primary);
            box-shadow: 0 0 0 0.15rem rgba(93, 156, 236, 0.25);
        }
        .ops-panel {
            position: sticky;
            bottom: 0;
            background-color: var(--sa-bg-secondary);
            border: 1px solid var(--sa-border);
            border-radius: 6px 6px 0 0;
            padding: 1rem;
            z-index: 50;
        }
        .op-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.4rem 0.6rem;
            background-color: var(--sa-bg-tertiary);
            border-radius: 4px;
            margin-bottom: 0.25rem;
            font-size: 0.85rem;
        }
        .series-header {
            cursor: pointer;
            padding: 0.75rem 1rem;
            background-color: var(--sa-bg-secondary);
            border: 1px solid var(--sa-border);
            border-radius: 6px;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.15s;
        }
        .series-header:hover {
            background-color: var(--sa-bg-tertiary);
        }
        .series-episodes {
            display: none;
            padding-left: 1rem;
            margin-bottom: 1rem;
        }
        .series-episodes.show {
            display: block;
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--sa-text-muted);
        }
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }
        .table thead th.sortable {
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }
        .table thead th.sortable:hover {
            color: var(--sa-text-primary);
        }
        .table thead th.sortable .sort-icon {
            opacity: 0.35;
            font-size: 0.75em;
            margin-left: 0.3em;
        }
        .table thead th.sortable[data-sort-dir] .sort-icon {
            opacity: 1;
            color: var(--sa-accent);
        }
        .spinner-border-sm {
            width: 1rem;
            height: 1rem;
        }
        @media (max-width: 768px) {
            .sidebar { width: 60px; }
            .sidebar-brand span { display: none; }
            .sidebar-nav a span { display: none; }
            .main-content { margin-left: 60px; padding: 1rem; }
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <a href="/" class="sidebar-brand">
            <i class="bi bi-film"></i>
            <span>StreamArr</span>
        </a>
        <div class="sidebar-nav">
            <a href="/" class="{{if eq .Page "dashboard"}}active{{end}}">
                <i class="bi bi-grid-1x2"></i>
                <span>Dashboard</span>
            </a>
            <a href="/movies" class="{{if eq .Page "movies"}}active{{end}}">
                <i class="bi bi-camera-reels"></i>
                <span>Movies</span>
            </a>
            <a href="/shows" class="{{if eq .Page "shows"}}active{{end}}">
                <i class="bi bi-tv"></i>
                <span>TV Shows</span>
            </a>
            <a href="/jobs" class="{{if eq .Page "jobs"}}active{{end}}">
                <i class="bi bi-list-task"></i>
                <span>Jobs</span>
            </a>
            <a href="/settings" class="{{if eq .Page "settings"}}active{{end}}">
                <i class="bi bi-gear"></i>
                <span>Settings</span>
            </a>
        </div>
    </nav>
    <div class="main-content">
        {{template "content" .}}
    </div>
    <div id="sa-toast-container" class="position-fixed bottom-0 end-0 p-3" style="z-index:1100;min-width:320px;max-width:420px;"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    function sortTable(th) {
        const thead = th.closest('thead');
        const tbody = th.closest('table').querySelector('tbody');
        const allThs = Array.from(thead.querySelectorAll('th'));
        const colIndex = allThs.indexOf(th);
        const currentDir = th.dataset.sortDir || '';
        const newDir = currentDir === 'asc' ? 'desc' : 'asc';

        thead.querySelectorAll('th.sortable').forEach(function(h) {
            delete h.dataset.sortDir;
            var icon = h.querySelector('.sort-icon');
            if (icon) icon.className = 'sort-icon bi bi-arrow-down-up';
        });

        th.dataset.sortDir = newDir;
        var icon = th.querySelector('.sort-icon');
        if (icon) icon.className = 'sort-icon bi bi-arrow-' + (newDir === 'asc' ? 'up' : 'down');

        var rows = Array.from(tbody.querySelectorAll('tr'));
        rows.sort(function(a, b) {
            var aTd = a.querySelectorAll('td')[colIndex];
            var bTd = b.querySelectorAll('td')[colIndex];
            var aVal = aTd.dataset.sortValue !== undefined ? aTd.dataset.sortValue : aTd.textContent.trim();
            var bVal = bTd.dataset.sortValue !== undefined ? bTd.dataset.sortValue : bTd.textContent.trim();
            var cmp;
            if (aVal !== '' && bVal !== '' && !isNaN(aVal) && !isNaN(bVal)) {
                cmp = Number(aVal) - Number(bVal);
            } else {
                cmp = aVal.localeCompare(bVal, undefined, { numeric: true, sensitivity: 'base' });
            }
            return newDir === 'asc' ? cmp : -cmp;
        });
        rows.forEach(function(row) { tbody.appendChild(row); });
    }

    // ---- Toast / job-failure notification system ----

    function _escHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function showToast(message, type, linkHref, linkText) {
        var container = document.getElementById('sa-toast-container');
        if (!container) return;
        var id = 'sa-t-' + Date.now();
        var delay = type === 'danger' ? 12000 : 6000;
        var typeClass = (type === 'danger' || type === 'success' || type === 'warning') ? type : 'secondary';
        var linkHtml = linkHref
            ? ' <a href="' + _escHtml(linkHref) + '" style="color:inherit;font-weight:700;text-decoration:underline;">' + _escHtml(linkText || 'View') + '</a>'
            : '';
        container.insertAdjacentHTML('beforeend',
            '<div id="' + id + '" class="toast text-bg-' + typeClass + ' border-0" role="alert" aria-atomic="true" data-bs-delay="' + delay + '">' +
            '<div class="d-flex align-items-center px-1">' +
            '<div class="toast-body">' + message + linkHtml + '</div>' +
            '<button type="button" class="btn-close btn-close-white me-2 ms-auto flex-shrink-0" data-bs-dismiss="toast" aria-label="Close"></button>' +
            '</div></div>');
        var el = document.getElementById(id);
        new bootstrap.Toast(el).show();
        el.addEventListener('hidden.bs.toast', function() { el.remove(); });
    }

    function queueToast(message, type, linkHref, linkText) {
        try {
            var q = JSON.parse(localStorage.getItem('sa-toast-queue') || '[]');
            q.push({message: message, type: type, linkHref: linkHref, linkText: linkText});
            localStorage.setItem('sa-toast-queue', JSON.stringify(q));
        } catch(e) {}
    }

    function _flushToastQueue() {
        try {
            var q = JSON.parse(localStorage.getItem('sa-toast-queue') || '[]');
            if (!q.length) return;
            localStorage.removeItem('sa-toast-queue');
            q.forEach(function(t) { showToast(t.message, t.type, t.linkHref, t.linkText); });
        } catch(e) {}
    }

    function trackJobForFailure(jobId) {
        try {
            var jobs = JSON.parse(localStorage.getItem('sa-tracking-jobs') || '[]');
            if (jobs.indexOf(jobId) === -1) {
                jobs.push(jobId);
                localStorage.setItem('sa-tracking-jobs', JSON.stringify(jobs));
            }
        } catch(e) {}
    }

    function _removeTrackedJob(jobId) {
        try {
            var jobs = JSON.parse(localStorage.getItem('sa-tracking-jobs') || '[]');
            localStorage.setItem('sa-tracking-jobs', JSON.stringify(jobs.filter(function(id) { return id !== jobId; })));
        } catch(e) {}
    }

    function _pollTrackedJobs() {
        try {
            var jobs = JSON.parse(localStorage.getItem('sa-tracking-jobs') || '[]');
            jobs.forEach(function(jobId) {
                fetch('/api/jobs/' + jobId + '/status-json')
                    .then(function(r) { return r.ok ? r.json() : null; })
                    .then(function(data) {
                        if (!data) return;
                        if (data.status === 'failed') {
                            _removeTrackedJob(jobId);
                            var msg = data.filename
                                ? 'Job failed for <strong>' + _escHtml(data.filename) + '</strong>.'
                                : 'A job failed.';
                            showToast(msg, 'danger', '/jobs', 'View Jobs');
                        } else if (data.status === 'done') {
                            _removeTrackedJob(jobId);
                        }
                    })
                    .catch(function() {});
            });
        } catch(e) {}
    }

    document.addEventListener('DOMContentLoaded', function() {
        // Pick up job ID passed via redirect after single-file job creation
        var params = new URLSearchParams(window.location.search);
        var newJob = params.get('new_job');
        if (newJob) {
            trackJobForFailure(parseInt(newJob, 10));
            params.delete('new_job');
            var newUrl = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
            history.replaceState(null, '', newUrl);
        }

        // Show any toasts queued before a page reload (e.g. bulk job success)
        _flushToastQueue();

        // Poll tracked jobs for failure every 5 seconds
        _pollTrackedJobs();
        setInterval(_pollTrackedJobs, 5000);
    });
    </script>
    <script>
    function rescanFile(id, btn) {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
        fetch('/api/media/' + id + '/rescan', {method: 'POST'})
            .then(r => {
                if (!r.ok) throw new Error();
                btn.innerHTML = '<i class="bi bi-check-lg text-success"></i>';
                setTimeout(() => { btn.disabled = false; btn.innerHTML = '<i class="bi bi-arrow-clockwise"></i>'; }, 2000);
            })
            .catch(() => {
                btn.innerHTML = '<i class="bi bi-x-lg text-danger"></i>';
                setTimeout(() => { btn.disabled = false; btn.innerHTML = '<i class="bi bi-arrow-clockwise"></i>'; }, 2000);
            });
    }

    function rescanSeries(title, libraryRootID, btn) {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
        const body = new URLSearchParams({title: title, library_root_id: libraryRootID});
        fetch('/api/series/rescan', {method: 'POST', body: body})
            .then(r => {
                if (!r.ok) throw new Error();
                btn.innerHTML = '<i class="bi bi-check-lg text-success"></i>';
                setTimeout(() => { btn.disabled = false; btn.innerHTML = '<i class="bi bi-arrow-clockwise"></i>'; }, 2000);
            })
            .catch(() => {
                btn.innerHTML = '<i class="bi bi-x-lg text-danger"></i>';
                setTimeout(() => { btn.disabled = false; btn.innerHTML = '<i class="bi bi-arrow-clockwise"></i>'; }, 2000);
            });
    }
    </script>
    {{template "scripts" .}}
</body>
</html>
{{end}}

{{define "scripts"}}{{end}}
